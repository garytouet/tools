<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools — garytouet.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f8f6;
      color: #1a1a18;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #6b6b68;
      text-decoration: none;
    }
    .back-link:hover { color: #1a1a18; }

    .theme-toggle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid #e5e4e0;
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: #b4b2a9; }
    .theme-toggle svg { width: 15px; height: 15px; }
    .icon-sun  { display: none; }
    .icon-moon { display: block; }

    h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.35rem; }

    .subtitle { font-size: 15px; color: #6b6b68; margin-bottom: 2rem; }

    .tool-list { display: flex; flex-direction: column; gap: 10px; }

    .tool-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #ffffff;
      border: 1px solid #e5e4e0;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .tool-card:hover {
      border-color: #b4b2a9;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .tool-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-tea   { background: #e1f5ee; }
    .icon-emoji { background: #eeedfe; }
    .tool-icon svg { width: 20px; height: 20px; }

    .tool-info { flex: 1; }
    .tool-name { font-size: 15px; font-weight: 500; }
    .tool-desc { font-size: 13px; color: #6b6b68; margin-top: 2px; }
    .tool-arrow { font-size: 16px; color: #b4b2a9; }

    .footer { margin-top: 2.5rem; font-size: 13px; color: #9a9994; }

    /* Dark mode via html.dark */
    html.dark body             { background: #1a1a18; color: #e8e7e2; }
    html.dark .back-link       { color: #888780; }
    html.dark .back-link:hover { color: #e8e7e2; }
    html.dark .subtitle        { color: #888780; }
    html.dark .theme-toggle    { background: #2c2c2a; border-color: #3a3a37; color: #e8e7e2; }
    html.dark .theme-toggle:hover { border-color: #5f5e5a; }
    html.dark .icon-sun        { display: block; }
    html.dark .icon-moon       { display: none; }
    html.dark .tool-card       { background: #2c2c2a; border-color: #3a3a37; }
    html.dark .tool-card:hover { border-color: #5f5e5a; box-shadow: none; }
    html.dark .icon-tea        { background: #085041; }
    html.dark .icon-emoji      { background: #3c3489; }
    html.dark .tool-desc       { color: #888780; }
    html.dark .tool-arrow      { color: #5f5e5a; }
    html.dark .footer          { color: #5f5e5a; }
  </style>
  <script>
    /* Apply saved or system theme before first paint to avoid flash */
    (function() {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <div class="page">
    <div class="top-bar">
      <a href="https://garytouet.com" class="back-link">← garytouet.com</a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <h1>Tools</h1>
    <p class="subtitle">A small collection of browser-based utilities.</p>

    <div class="tool-list">

      <a href="/tea-cooling-calculator.html" class="tool-card">
        <div class="tool-icon icon-tea">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 3h12l-1.5 10.5A3 3 0 0 1 13.52 16H10.48a3 3 0 0 1-2.98-2.5L6 3Z" stroke="#0F6E56" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M17 6h1.5a2 2 0 0 1 0 4H17" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M8 19h8" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M12 16v3" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tool-info">
          <div class="tool-name">Tea cooling calculator</div>
          <div class="tool-desc">Estimate how long until your tea is the perfect drinking temperature.</div>
        </div>
        <span class="tool-arrow">→</span>
      </a>

      <a href="/emoji-to-png.html" class="tool-card">
        <div class="tool-icon icon-emoji">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="#534AB7" stroke-width="1.5"/>
            <path d="M8.5 14.5s1 1.5 3.5 1.5 3.5-1.5 3.5-1.5" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9.5" cy="10.5" r="1" fill="#534AB7"/>
            <circle cx="14.5" cy="10.5" r="1" fill="#534AB7"/>
          </svg>
        </div>
        <div class="tool-info">
          <div class="tool-name">Emoji to PNG</div>
          <div class="tool-desc">Convert any emoji into a downloadable PNG image.</div>
        </div>
        <span class="tool-arrow">→</span>
      </a>

    </div>

    <p class="footer">More tools coming soon.</p>
  </div>

  <script>
    function toggleTheme() {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>
</body>
</html>
