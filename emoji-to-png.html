<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emoji to PNG</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f3;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0e0dc;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #111; }
    .label { font-size: 13px; color: #666; margin-bottom: 6px; }
    .drop-area {
      border: 1.5px dashed #ccc;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .drop-area p { font-size: 14px; color: #888; margin-bottom: 8px; }
    .emoji-input {
      font-size: 48px;
      width: 100%;
      text-align: center;
      border: 1px solid #e0e0dc;
      border-radius: 8px;
      padding: 12px;
      background: #fafaf8;
      outline: none;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .opt-btn {
      border: 1px solid #ddd;
      background: #fff;
      color: #333;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .opt-btn.active {
      background: #e8f0fe;
      color: #1a56db;
      border-color: #a4c2f7;
    }
    #preview-wrap { text-align: center; margin: 1rem 0; display: none; }
    #preview-wrap p { font-size: 13px; color: #888; margin-bottom: 8px; }
    #preview-canvas {
      border-radius: 8px;
      border: 1px solid #e0e0dc;
      background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                        linear-gradient(-45deg, #ccc 25%, transparent 25%),
                        linear-gradient(45deg, transparent 75%, #ccc 75%),
                        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 12px 12px;
      background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
    }
    .dl-btn {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.1s;
    }
    .dl-btn:hover { background: #f5f5f3; }
    .dl-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Emoji → PNG</h1>

    <div class="drop-area">
      <p>Paste or type an emoji below</p>
      <input class="emoji-input" id="emoji-input" maxlength="8" placeholder="😀" oninput="renderPreview()" />
    </div>

    <p class="label">Size (px)</p>
    <div class="btn-group" id="size-group">
      <button class="opt-btn active" data-size="64" onclick="selectSize(this)">64</button>
      <button class="opt-btn" data-size="128" onclick="selectSize(this)">128</button>
      <button class="opt-btn" data-size="256" onclick="selectSize(this)">256</button>
      <button class="opt-btn" data-size="512" onclick="selectSize(this)">512</button>
    </div>

    <p class="label">Background</p>
    <div class="btn-group" id="bg-group">
      <button class="opt-btn active" data-bg="transparent" onclick="selectBg(this)">Transparent</button>
      <button class="opt-btn" data-bg="white" onclick="selectBg(this)">White</button>
      <button class="opt-btn" data-bg="black" onclick="selectBg(this)">Black</button>
    </div>

    <div id="preview-wrap">
      <p>Preview</p>
      <canvas id="preview-canvas"></canvas>
    </div>

    <button class="dl-btn" id="dl-btn" onclick="downloadPng()" disabled>Download PNG</button>
  </div>

  <script>
    let selectedSize = 64;
    let selectedBg = 'transparent';

    function selectSize(btn) {
      document.querySelectorAll('#size-group .opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedSize = parseInt(btn.dataset.size);
      renderPreview();
    }

    function selectBg(btn) {
      document.querySelectorAll('#bg-group .opt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedBg = btn.dataset.bg;
      renderPreview();
    }

    function drawEmoji(canvas, size) {
      const ctx = canvas.getContext('2d');
      canvas.width = size;
      canvas.height = size;
      ctx.clearRect(0, 0, size, size);
      if (selectedBg === 'white') { ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, size, size); }
      else if (selectedBg === 'black') { ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, size, size); }
      ctx.font = `${size * 0.75}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(document.getElementById('emoji-input').value.trim(), size / 2, size / 2);
    }

    function renderPreview() {
      const input = document.getElementById('emoji-input').value.trim();
      const wrap = document.getElementById('preview-wrap');
      const dlBtn = document.getElementById('dl-btn');
      if (!input) { wrap.style.display = 'none'; dlBtn.disabled = true; return; }
      drawEmoji(document.getElementById('preview-canvas'), 128);
      wrap.style.display = 'block';
      dlBtn.disabled = false;
    }

    function downloadPng() {
      const input = document.getElementById('emoji-input').value.trim();
      if (!input) return;
      const canvas = document.createElement('canvas');
      drawEmoji(canvas, selectedSize);
      const link = document.createElement('a');
      link.download = `emoji-${selectedSize}px.png`;
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
